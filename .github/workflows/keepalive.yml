name: Supabase Keepalive

on:
  schedule:
    - cron: "0 6 */3 * *" # every 3 days at 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl -f -H "x-keepalive-secret: ${{ secrets.KEEPALIVE_SECRET }}" \
            https://casa-barbero-admin-api.fly.dev/api/keepalive
